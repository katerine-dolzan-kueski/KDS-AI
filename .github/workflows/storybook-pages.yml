name: Deploy Storybook to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Storybook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
          cache-dependency-path: ./pnpm-lock.yaml
          # Authenticates against GitHub Packages for @kueski-dev scoped packages
          registry-url: https://npm.pkg.github.com/
          scope: "@kueski-dev"

      - name: Install dependencies
        run: pnpm install
        env:
          # GITHUB_TOKEN has read:packages access within the same org.
          # If this repo is personal (outside kueski-dev org), create a PAT
          # with read:packages scope and add it as a repo secret named
          # PACKAGES_TOKEN, then change the line below to:
          #   NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
