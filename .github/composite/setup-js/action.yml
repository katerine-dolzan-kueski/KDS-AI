name: "Install"
description: "Sets up Node.js and runs install"

runs:
  using: composite
  steps:
    # - name: Create .npmrc file with secret NPM_KUESKI_DEV_REGISTRY_AUTH_TOKEN using shell script
    #   run: |
    #     echo -n "" > .npmrc
    #     echo "scripts-prepend-node-path=true" >> .npmrc
    #     echo "@kueski-dev:registry=https://npm.pkg.github.com/" >> .npmrc
    #     echo "//npm.pkg.github.com/:_authToken=$NPM_KUESKI_DEV_REGISTRY_AUTH_TOKEN" >> .npmrc
    #     echo .npmrc
    #   shell: bash
    #   env:
    #     NPM_KUESKI_DEV_REGISTRY_AUTH_TOKEN: "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"

    - uses: pnpm/action-setup@v4
      name: Install pnpm
      with:
        version: 10.16.1
        run_install: false

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.12.0
        cache: "pnpm"
        cache-dependency-path: "./pnpm-lock.yaml"
        registry-url: https://npm.pkg.github.com/
        scope: "@kueski-dev"

    - name: Install dependencies
      shell: bash
      run: pnpm install
